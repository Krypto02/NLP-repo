
services:

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.6.3
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  llama:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models:ro
    command: >
      -m /models/mistral-7b-instruct-v0.2.Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      -c 2048
      -ngl 35
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 300s

  flask_app:
    build:
      context: ./flask_app
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      MINIO_ENDPOINT:    minio:9000
      MINIO_ACCESS_KEY:  minioadmin
      MINIO_SECRET_KEY:  minioadmin
      MINIO_BUCKET:      documents
      CHROMA_HOST:       chromadb
      CHROMA_PORT:       "8000"
      LLM_URL:           http://llama:8080
      CHUNK_SIZE:        "256"
      CHUNK_OVERLAP:     "32"
      EMBEDDING_MODEL:   all-MiniLM-L6-v2
      RETRIEVAL_METHOD:  hybrid
      TOP_K:             "5"
      MAX_UPLOAD_MB:     "50"
      BM25_DIR:          /data/bm25
      REGISTRY_PATH:     /data/docs_registry.json
    volumes:
      - flask_data:/data
    depends_on:
      minio:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      llama:
        condition: service_healthy

  streamlit:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      API_URL: http://flask_app:5000
    depends_on:
      - flask_app

volumes:
  minio_data:
  chroma_data:
  flask_data:
